<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCP Explorer — See How AI Agents Discover Your Store</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Georgia, "Times New Roman", serif;
            font-size: 16px;
            line-height: 1.6;
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
            color: #1a1a1a;
        }

        .page-header {
            max-width: 720px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #555;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
        }

        .input-row input {
            flex: 1;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 15px;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-row input:focus {
            border-color: #888;
        }

        .input-row button {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 500;
            padding: 10px 20px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-row button:hover {
            background: #333;
        }

        .input-row button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .log {
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            background: #fafafa;
            padding: 20px;
            min-height: 100px;
            display: none;
        }

        .log.active {
            display: block;
        }

        .step {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            animation: fadeIn 0.3s ease-in;
        }

        .step:last-child {
            border-bottom: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .step-icon {
            font-size: 14px;
            width: 20px;
            flex-shrink: 0;
            text-align: center;
            padding-top: 2px;
        }

        .step-text {
            font-size: 15px;
            flex: 1;
        }

        .step-text strong {
            font-weight: 600;
        }

        .step-detail {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            color: #595959;
            margin-top: 4px;
            margin-left: 30px;
        }

        .step-raw {
            margin-top: 8px;
            margin-left: 30px;
        }

        .step-raw summary {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            color: #595959;
            cursor: pointer;
            user-select: none;
        }

        .step-raw summary:hover {
            color: #333;
        }

        .step-raw pre {
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, monospace;
            font-size: 12px;
            line-height: 1.5;
            background: #f0f0f0;
            border-radius: 4px;
            padding: 12px;
            margin-top: 6px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
        }

        .phase-label {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #999;
            margin-top: 16px;
            margin-bottom: 4px;
            padding-top: 12px;
            border-top: 1px solid #e5e5e5;
        }

        .phase-label:first-child {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }

        .search-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5e5e5;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
            margin-left: 30px;
        }

        .tool-card {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            padding: 10px 12px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            cursor: default;
        }

        .tool-card.interactive {
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .tool-card.interactive:hover {
            border-color: #bbb;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .tool-card .tool-name {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 13px;
        }

        .tool-card .tool-desc {
            color: #595959;
            font-size: 12px;
            margin-top: 3px;
            line-height: 1.4;
        }

        .tool-card .tool-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 3px;
            margin-top: 6px;
        }

        .tool-badge.try-it {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .tool-badge.info {
            background: #f5f5f5;
            color: #595959;
        }

        .interact-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5e5e5;
        }

        @media (min-width: 800px) {
            .interact-section {
                display: grid;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto 1fr;
                gap: 0 20px;
            }

            .interact-tabs {
                grid-column: 1;
            }

            .interact-panel {
                grid-column: 1;
            }

            .json-pane {
                grid-column: 2;
                grid-row: 1 / 3;
                display: block !important;
            }
        }

        .json-pane {
            display: none;
            background: #f5f5f5;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 16px;
            overflow: hidden;
        }

        .json-pane-header {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 8px;
        }

        .json-pane pre {
            font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, monospace;
            font-size: 12px;
            line-height: 1.5;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            padding: 12px;
            overflow: auto;
            max-height: calc(100vh - 200px);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .interact-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 12px;
            border-bottom: 1px solid #e5e5e5;
        }

        .interact-tab {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 16px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: #888;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .interact-tab:hover {
            color: #555;
        }

        .interact-tab.active {
            color: #1a1a1a;
            border-bottom-color: #1a1a1a;
        }

        .interact-panel {
            display: none;
        }

        .interact-panel.active {
            display: block;
        }

        .interact-panel p.hint {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            color: #595959;
            margin-bottom: 8px;
        }

        .query-row {
            display: flex;
            gap: 8px;
        }

        .query-row input {
            flex: 1;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
        }

        .query-row input:focus {
            border-color: #888;
        }

        .query-row button {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 13px;
            padding: 8px 16px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .query-row button:hover {
            background: #333;
        }

        .results-area {
            margin-top: 12px;
        }

        .product-card {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .product-card:hover {
            border-color: #bbb;
        }

        .product-card img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
            background: #f0f0f0;
        }

        .product-card .product-info {
            flex: 1;
            min-width: 0;
        }

        .product-card .name {
            font-weight: 500;
            font-size: 14px;
            color: #1a1a1a;
        }

        .product-card .price {
            font-size: 14px;
            color: #333;
            margin-top: 2px;
        }

        .product-card .variants {
            font-size: 13px;
            color: #595959;
            margin-top: 2px;
        }

        .product-card .view-details {
            display: inline-block;
            font-size: 13px;
            font-weight: 500;
            color: #1a1a1a;
            margin-top: 6px;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .policy-answer {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
            padding: 12px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            margin-top: 8px;
        }

        .policy-qa {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .policy-qa:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .policy-qa .pq {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .policy-qa .pa {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }

        .product-detail {
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .product-detail-header {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
        }

        .product-detail-header img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 6px;
            background: #f0f0f0;
            flex-shrink: 0;
        }

        .product-detail-header .detail-meta {
            flex: 1;
            min-width: 0;
        }

        .product-detail h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1a1a1a;
        }

        .product-detail .detail-row {
            font-size: 14px;
            color: #333;
            margin-bottom: 6px;
            line-height: 1.5;
        }

        .product-detail .detail-label {
            font-weight: 600;
            color: #1a1a1a;
        }

        .product-detail .detail-desc {
            font-size: 14px;
            color: #444;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .product-detail .pdp-link {
            display: inline-block;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            background: #1a1a1a;
            padding: 8px 16px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .product-detail .pdp-link:hover {
            background: #333;
        }

        .detail-loading {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #595959;
        }

        .loading-dot {
            display: inline-block;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="page-header">
        <h1>UCP Explorer</h1>
        <p class="subtitle">See how AI agents discover and interact with a store's commerce endpoints.</p>

        <div class="input-row">
            <input type="text" id="domain-input" placeholder="Enter a store domain (e.g. pepperpalace.com)" autocomplete="off">
            <button id="go-btn" onclick="startExploration()">Explore</button>
        </div>
    </div>

    <div class="log" id="log"></div>

    <script>
    // Configuration
    const PROXY_BASE = 'https://ucp-proxy.kylerisley.com';
    const AI_AGENTS = [
        'Googlebot', 'Bingbot', 'ChatGPT-User', 'Claude-User',
        'Perplexity-User', 'PerplexityBot', 'OAI-SearchBot',
        'Claude-SearchBot', 'Google-Agent', 'Applebot'
    ];

    let currentDomain = '';
    let mcpEndpoint = '';

    // UI helpers
    const log = document.getElementById('log');
    const domainInput = document.getElementById('domain-input');
    const goBtn = document.getElementById('go-btn');

    domainInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') startExploration();
    });

    function addPhaseLabel(text) {
        const el = document.createElement('div');
        el.className = 'phase-label';
        el.textContent = text;
        log.appendChild(el);
    }

    function addStep(icon, text, detail, raw) {
        const step = document.createElement('div');
        step.className = 'step';

        let html = `<div class="step-header">
            <span class="step-icon">${icon}</span>
            <span class="step-text">${text}</span>
        </div>`;

        if (detail) {
            html += `<div class="step-detail">${detail}</div>`;
        }

        if (raw) {
            html += `<details class="step-raw">
                <summary>Show raw response</summary>
                <pre>${escapeHtml(typeof raw === 'string' ? raw : JSON.stringify(raw, null, 2))}</pre>
            </details>`;
        }

        step.innerHTML = html;
        log.appendChild(step);
        step.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        return step;
    }

    function updateStep(step, icon, text, detail, raw) {
        let html = `<div class="step-header">
            <span class="step-icon">${icon}</span>
            <span class="step-text">${text}</span>
        </div>`;

        if (detail) {
            html += `<div class="step-detail">${detail}</div>`;
        }

        if (raw) {
            html += `<details class="step-raw">
                <summary>Show raw response</summary>
                <pre>${escapeHtml(typeof raw === 'string' ? raw : JSON.stringify(raw, null, 2))}</pre>
            </details>`;
        }

        step.innerHTML = html;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function delay(ms) {
        return new Promise(r => setTimeout(r, ms));
    }

    // Proxy fetch
    async function proxyFetch(url, options = {}) {
        const proxyUrl = `${PROXY_BASE}?url=${encodeURIComponent(url)}`;
        const resp = await fetch(proxyUrl, options);
        return resp;
    }

    // Main exploration flow
    async function startExploration() {
        const domain = domainInput.value.trim().replace(/^https?:\/\//, '').replace(/\/+$/, '');
        if (!domain) return;

        currentDomain = domain;
        mcpEndpoint = '';
        log.innerHTML = '';
        log.classList.add('active');
        goBtn.disabled = true;

        try {
            await phase1(domain);
            await delay(300);
            await phase2(domain);
            await delay(300);
            await phase3(domain);
        } catch (e) {
            addStep('✗', `Unexpected error: ${e.message}`);
        }

        goBtn.disabled = false;
    }

    // Phase 1: Agent-readiness checks
    async function phase1(domain) {
        addPhaseLabel('Agent Readiness');

        // Check reachability
        const reachUrl = `https://${domain}/robots.txt`;
        let step = addStep('⏳', `Checking if <strong>${domain}</strong> is reachable...`, `GET ${reachUrl}`);
        try {
            const resp = await proxyFetch(reachUrl);
            if (resp.ok || resp.status === 404) {
                updateStep(step, '✓', `<strong>${domain}</strong> is reachable.`, `GET ${reachUrl} → HTTP ${resp.status}`);
            } else {
                updateStep(step, '✗', `<strong>${domain}</strong> returned HTTP ${resp.status}. May not be accessible.`, `GET ${reachUrl} → HTTP ${resp.status}`);
                return;
            }
        } catch (e) {
            updateStep(step, '✗', `Could not reach <strong>${domain}</strong>. Check the domain and try again.`, `GET ${reachUrl} → Connection failed`);
            return;
        }

        await delay(400);

        // robots.txt
        const robotsUrl = `https://${domain}/robots.txt`;
        step = addStep('⏳', `Fetching <code>/robots.txt</code> to see which AI agents are welcome...`, `GET ${robotsUrl}`);
        try {
            const resp = await proxyFetch(robotsUrl);
            if (resp.ok) {
                const text = await resp.text();
                const analysis = analyzeRobotsTxt(text);
                updateStep(step, '✓',
                    `Found <code>/robots.txt</code> — <strong>${analysis.allowed}/${AI_AGENTS.length}</strong> known AI agents are allowed.`,
                    `GET ${robotsUrl} → HTTP ${resp.status}` + (analysis.blocked.length > 0 ? ` | Blocked: ${analysis.blocked.join(', ')}` : ' | All checked agents are allowed.'),
                    text
                );
            } else {
                updateStep(step, '–', `No <code>/robots.txt</code> found — all agents are implicitly allowed.`, `GET ${robotsUrl} → HTTP ${resp.status}`);
            }
        } catch (e) {
            updateStep(step, '–', `Could not fetch <code>/robots.txt</code>.`, `GET ${robotsUrl} → Connection failed`);
        }

        await delay(400);

        // llms.txt
        const llmsUrl = `https://${domain}/llms.txt`;
        step = addStep('⏳', `Looking for <code>/llms.txt</code>...`, `GET ${llmsUrl}`);
        try {
            const resp = await proxyFetch(llmsUrl);
            if (resp.ok) {
                const text = await resp.text();
                updateStep(step, '✓', `Found <code>/llms.txt</code> — this site provides context for LLMs.`,
                    `GET ${llmsUrl} → HTTP ${resp.status} | ${text.split('\n').length} lines`,
                    text
                );
            } else {
                updateStep(step, '–', `No <code>/llms.txt</code> present. This is normal — llms.txt is an emerging convention and most sites don't publish one yet.`, `GET ${llmsUrl} → HTTP ${resp.status}`);
            }
        } catch (e) {
            updateStep(step, '–', `No <code>/llms.txt</code> present. This is normal — llms.txt is an emerging convention and most sites don't publish one yet.`, `GET ${llmsUrl} → Connection failed`);
        }

        await delay(400);

        // agents.md
        const agentsUrl = `https://${domain}/agents.md`;
        step = addStep('⏳', `Checking for <code>/agents.md</code> manifest...`, `GET ${agentsUrl}`);
        try {
            const resp = await proxyFetch(agentsUrl);
            if (resp.ok) {
                const text = await resp.text();
                updateStep(step, '✓', `Found <code>/agents.md</code>.`,
                    `GET ${agentsUrl} → HTTP ${resp.status} | ${text.split('\n').length} lines`,
                    text
                );
            } else {
                updateStep(step, '–', `No <code>/agents.md</code> present. This is expected — agents.md is an early-stage convention for providing instructions to AI agents.`, `GET ${agentsUrl} → HTTP ${resp.status}`);
            }
        } catch (e) {
            updateStep(step, '–', `No <code>/agents.md</code> present. This is expected — agents.md is an early-stage convention for providing instructions to AI agents.`, `GET ${agentsUrl} → Connection failed`);
        }

        await delay(400);

        // Agent Skills Discovery (experimental RFC: github.com/cloudflare/agent-skills-discovery-rfc)
        const rfcLink = '<a href="https://github.com/cloudflare/agent-skills-discovery-rfc" target="_blank" rel="noopener">Agent Skills Discovery RFC</a>';
        const skillsPaths = [
            { url: `https://${domain}/.well-known/agent-skills/index.json`, label: '/.well-known/agent-skills/index.json', note: 'current' },
            { url: `https://${domain}/.well-known/skills/index.json`, label: '/.well-known/skills/index.json', note: 'legacy' }
        ];
        step = addStep('⏳', `Checking for agent skills index (experimental)...`, `Checking ${skillsPaths.map(s => s.label).join(' and ')}`);
        let foundSkills = false;
        let skillsDetail = '';
        for (const sp of skillsPaths) {
            try {
                const resp = await proxyFetch(sp.url);
                skillsDetail += (skillsDetail ? ' | ' : '') + `GET ${sp.url} → HTTP ${resp.status}`;
                if (resp.ok && !foundSkills) {
                    const text = await resp.text();
                    let skillCount = '';
                    try {
                        const parsed = JSON.parse(text);
                        const skills = parsed.skills || parsed.entries || [];
                        if (Array.isArray(skills)) skillCount = ` | ${skills.length} skill${skills.length !== 1 ? 's' : ''} listed`;
                    } catch (e) {}
                    updateStep(step, '✓', `Found <code>${sp.label}</code>${sp.note === 'legacy' ? ' (legacy path)' : ''}.`,
                        skillsDetail + skillCount + ` | Per the ${rfcLink} (experimental)`,
                        text
                    );
                    foundSkills = true;
                }
            } catch (e) {
                skillsDetail += (skillsDetail ? ' | ' : '') + `GET ${sp.url} → Connection failed`;
            }
        }
        if (!foundSkills) {
            updateStep(step, '–', `No agent skills index found. This is expected — the ${rfcLink} is still experimental and most sites don't implement it yet.`, skillsDetail);
        }
    }

    // Phase 2: UCP discovery
    async function phase2(domain) {
        addPhaseLabel('UCP Discovery');

        const ucpUrl = `https://${domain}/.well-known/ucp`;
        const step = addStep('⏳', `Checking for a UCP profile at <code>/.well-known/ucp</code>...`, `GET ${ucpUrl}`);
        try {
            const resp = await proxyFetch(ucpUrl);
            if (resp.ok) {
                const text = await resp.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    updateStep(step, '✗', `Found a file at <code>/.well-known/ucp</code> but it is not valid JSON.`, `GET ${ucpUrl} → HTTP ${resp.status} | Response is not valid JSON`, text);
                    return;
                }

                // Parse capabilities
                const capabilities = extractCapabilities(data);
                const mcpUrl = extractMcpEndpoint(data, domain);

                let detail = `GET ${ucpUrl} → HTTP ${resp.status}`;
                if (capabilities.length > 0) {
                    detail += ` | Capabilities: ${capabilities.join(', ')}`;
                }
                if (mcpUrl) {
                    detail += ` | MCP endpoint: ${mcpUrl}`;
                    mcpEndpoint = mcpUrl;
                }

                updateStep(step, '✓',
                    'Found it! This store publishes a UCP manifest.',
                    detail,
                    data
                );
            } else {
                updateStep(step, '✗', `No UCP manifest found at this domain. This store may not have UCP enabled yet.`, `GET ${ucpUrl} → HTTP ${resp.status}`);

                // Try the Shopify convention
                await delay(300);
                const fallbackUrl = `https://${domain}/api/ucp/mcp`;
                const step2 = addStep('⏳', `Trying Shopify MCP endpoint convention: <code>/api/ucp/mcp</code>...`, `POST ${fallbackUrl}`);
                try {
                    const mcpResp = await proxyFetch(fallbackUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ jsonrpc: '2.0', method: 'tools/list', id: 1, params: { _meta: { 'ucp-agent': { profile: 'https://kylerisley.com/tools/ucp-explorer/agent-profile.json' } } } })
                    });
                    if (mcpResp.ok) {
                        mcpEndpoint = fallbackUrl;
                        updateStep(step2, '✓', `MCP endpoint found at <code>/api/ucp/mcp</code> (no UCP manifest, but endpoint responds).`, `POST ${fallbackUrl} → HTTP ${mcpResp.status}`);
                    } else {
                        updateStep(step2, '✗', `No MCP endpoint responding at the standard Shopify path either.`, `POST ${fallbackUrl} → HTTP ${mcpResp.status}`);
                    }
                } catch (e) {
                    updateStep(step2, '✗', `Could not connect to MCP endpoint.`, `POST ${fallbackUrl} → Connection failed`);
                }
            }
        } catch (e) {
            updateStep(step, '✗', `Error fetching UCP manifest: ${e.message}`);
        }
    }

    // Phase 3: MCP interaction
    async function phase3(domain) {
        const endpoints = [];
        if (mcpEndpoint) endpoints.push(mcpEndpoint);
        // Always try both standard and UCP endpoints
        const candidates = [
            `https://${domain}/api/mcp`,
            `https://${domain}/api/ucp/mcp`
        ];
        for (const c of candidates) {
            if (!endpoints.includes(c)) endpoints.push(c);
        }

        addPhaseLabel('MCP Interaction');

        let connected = false;
        for (const endpoint of endpoints) {
            const step = addStep('⏳', `Connecting to MCP endpoint at <code>${endpoint}</code>...`, `POST ${endpoint} | Method: tools/list`);

            try {
                // Try with agent profile meta (required for UCP endpoints)
                const resp = await proxyFetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        jsonrpc: '2.0',
                        method: 'tools/list',
                        id: 1,
                        params: {
                            _meta: {
                                'ucp-agent': {
                                    profile: 'https://kylerisley.com/tools/ucp-explorer/agent-profile.json'
                                }
                            }
                        }
                    })
                });

            if (!resp.ok) {
                updateStep(step, '–', `Endpoint returned HTTP ${resp.status}. Trying next endpoint...`, `POST ${endpoint} → HTTP ${resp.status}`);
                await delay(300);
                continue;
            }

            const text = await resp.text();
            let data;
            try {
                data = JSON.parse(text);
            } catch (e) {
                updateStep(step, '–', `Endpoint responded (HTTP ${resp.status}) but not with valid JSON. Trying next...`, `POST ${endpoint} → HTTP ${resp.status} | Invalid JSON`, text);
                await delay(300);
                continue;
            }

            const tools = extractTools(data);
            if (tools.length > 0) {
                mcpEndpoint = endpoint;
                updateStep(step, '✓',
                    `Connected! This store's MCP server offers <strong>${tools.length}</strong> tools:`,
                    `POST ${endpoint} → HTTP 200 | ${tools.length} tools discovered`,
                    data
                );

                // Render tool cards
                renderToolCards(step, tools);

                // Show interactive section
                await delay(300);
                showInteractiveSection(tools);

                connected = true;
                break;
            } else {
                updateStep(step, '–', `Connected (HTTP 200) but no tools were listed in the response.`, `POST ${endpoint} → HTTP 200 | 0 tools returned`, data);
                await delay(300);
                continue;
            }
        } catch (e) {
            updateStep(step, '–', `Could not connect to <code>${endpoint}</code>.`, `POST ${endpoint} → Connection failed: ${e.message}`);
            await delay(300);
            continue;
        }
        }

        if (!connected) {
            addStep('✗', 'Could not connect to any MCP endpoint. The store might restrict agent access or not have MCP enabled.');
        }
    }

    // Tool cards
    const TOOL_META = {
        search_catalog: { label: 'Search Catalog', short: 'Search products by keyword', interactive: true },
        get_product_details: { label: 'Product Details', short: 'Look up a product by ID', interactive: true },
        search_shop_policies_and_faqs: { label: 'Policies & FAQs', short: 'Ask about store policies', interactive: true },
        get_cart: { label: 'Get Cart', short: 'Retrieve cart contents', interactive: false },
        update_cart: { label: 'Update Cart', short: 'Add/remove cart items', interactive: false }
    };

    function renderToolCards(step, tools) {
        const grid = document.createElement('div');
        grid.className = 'tool-grid';
        tools.forEach(t => {
            const meta = TOOL_META[t.name] || { label: t.name, short: '', interactive: false };
            const card = document.createElement('div');
            card.className = 'tool-card' + (meta.interactive ? ' interactive' : '');
            card.innerHTML = `
                <div class="tool-name">${escapeHtml(meta.label)}</div>
                <div class="tool-desc">${escapeHtml(meta.short)}</div>
                <span class="tool-badge ${meta.interactive ? 'try-it' : 'info'}">${meta.interactive ? 'Try it' : 'Available'}</span>
            `;
            if (meta.interactive) {
                card.addEventListener('click', () => {
                    const tabId = t.name === 'search_catalog' ? 'catalog' :
                                  t.name === 'search_shop_policies_and_faqs' ? 'policies' : 'catalog';
                    switchTab(tabId);
                    document.querySelector('.interact-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            }
            grid.appendChild(card);
        });
        step.appendChild(grid);
    }

    function showInteractiveSection(tools) {
        const hasSearch = tools.some(t => t.name === 'search_catalog');
        const hasPolicies = tools.some(t => t.name === 'search_shop_policies_and_faqs');

        if (!hasSearch && !hasPolicies) return;

        const section = document.createElement('div');
        section.className = 'interact-section';

        let tabsHtml = '<div class="interact-tabs">';
        if (hasSearch) tabsHtml += '<button class="interact-tab active" onclick="switchTab(\'catalog\')">Search Catalog</button>';
        if (hasPolicies) tabsHtml += `<button class="interact-tab${hasSearch ? '' : ' active'}" onclick="switchTab('policies')">Policies & FAQs</button>`;
        tabsHtml += '</div>';

        let panelsHtml = '';
        if (hasSearch) {
            panelsHtml += `
                <div class="interact-panel active" id="panel-catalog">
                    <p class="hint">Search this store's product catalog. Click any product to see full details.</p>
                    <div class="query-row">
                        <input type="text" id="search-input" placeholder="e.g. hot sauce, gift sets, seasonings...">
                        <button onclick="searchCatalog()">Search</button>
                    </div>
                    <div class="results-area" id="catalog-results"></div>
                </div>
            `;
        }
        if (hasPolicies) {
            panelsHtml += `
                <div class="interact-panel${hasSearch ? '' : ' active'}" id="panel-policies">
                    <p class="hint">Ask a question about this store's policies, shipping, returns, or services.</p>
                    <div class="query-row">
                        <input type="text" id="policy-input" placeholder="e.g. What is your return policy?">
                        <button onclick="searchPolicies()">Ask</button>
                    </div>
                    <div class="results-area" id="policy-results"></div>
                </div>
            `;
        }

        const jsonPaneHtml = `
            <div class="json-pane" id="json-pane">
                <div class="json-pane-header">Raw Response</div>
                <pre id="json-pane-content">Make a request to see the raw JSON response here.</pre>
            </div>
        `;

        section.innerHTML = tabsHtml + panelsHtml + jsonPaneHtml;
        log.appendChild(section);

        document.getElementById('search-input')?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchCatalog();
        });
        document.getElementById('policy-input')?.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchPolicies();
        });
    }

    function switchTab(tabId) {
        document.querySelectorAll('.interact-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.interact-panel').forEach(p => p.classList.remove('active'));
        const panel = document.getElementById(`panel-${tabId}`);
        if (panel) {
            panel.classList.add('active');
            const tabs = document.querySelectorAll('.interact-tab');
            tabs.forEach(t => {
                if ((tabId === 'catalog' && t.textContent === 'Search Catalog') ||
                    (tabId === 'policies' && t.textContent === 'Policies & FAQs')) {
                    t.classList.add('active');
                }
            });
        }
    }

    // JSON pane helper
    function updateJsonPane(data) {
        const pane = document.getElementById('json-pane-content');
        if (pane) {
            pane.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
        }
    }

    // MCP tool call helper
    let callId = 10;
    function mcpCall(toolName, args) {
        return proxyFetch(mcpEndpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                jsonrpc: '2.0',
                method: 'tools/call',
                id: callId++,
                params: {
                    name: toolName,
                    arguments: {
                        meta: { 'ucp-agent': { profile: 'https://kylerisley.com/tools/ucp-explorer/agent-profile.json' } },
                        ...args
                    }
                }
            })
        });
    }

    // Catalog search
    async function searchCatalog() {
        const query = document.getElementById('search-input').value.trim();
        if (!query) return;

        const results = document.getElementById('catalog-results');
        results.innerHTML = '<span class="loading-dot">Searching...</span>';

        try {
            const resp = await mcpCall('search_catalog', { catalog: { query, pagination: { limit: 10 } } });
            const data = await resp.json();
            const products = extractProducts(data);

            updateJsonPane(data);

            if (products.length > 0) {
                results.innerHTML = products.map(p => `
                    <div class="product-card" onclick="getProductDetails('${escapeHtml(p.id || '')}')">
                        ${p.image ? `<img src="${escapeHtml(p.image)}" alt="${escapeHtml(p.name)}">` : ''}
                        <div class="product-info">
                            <div class="name">${escapeHtml(p.name)}</div>
                            ${p.price ? `<div class="price">${escapeHtml(p.price)}</div>` : ''}
                            ${p.variantCount ? `<div class="variants">${p.variantCount} variant${p.variantCount > 1 ? 's' : ''}</div>` : ''}
                            ${p.id ? '<span class="view-details">View full details</span>' : ''}
                        </div>
                    </div>
                `).join('');
            } else {
                results.innerHTML = `<div class="step-detail">No products found for "${escapeHtml(query)}".</div>`;
            }
        } catch (e) {
            results.innerHTML = `<div class="step-detail">Search failed: ${escapeHtml(e.message)}</div>`;
        }
    }

    // Product details
    async function getProductDetails(productId) {
        if (!productId) return;

        const results = document.getElementById('catalog-results');
        const existing = document.getElementById('product-detail-view');
        if (existing) existing.remove();

        const detail = document.createElement('div');
        detail.id = 'product-detail-view';
        detail.className = 'product-detail';
        detail.innerHTML = '<div class="detail-loading"><span class="loading-dot">Fetching product details via get_product_details...</span></div>';
        results.insertBefore(detail, results.firstChild);
        detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        try {
            const resp = await mcpCall('get_product_details', { product_id: productId });
            const data = await resp.json();
            updateJsonPane(data);
            const product = extractProductDetail(data);

            let html = '<div class="product-detail-header">';
            if (product.image) {
                html += `<img src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name)}">`;
            }
            html += '<div class="detail-meta">';
            html += `<h3>${escapeHtml(product.name)}</h3>`;
            if (product.price) html += `<div class="detail-row"><span class="detail-label">Price:</span> ${escapeHtml(product.price)}</div>`;
            if (product.totalVariants) html += `<div class="detail-row"><span class="detail-label">Variants:</span> ${product.totalVariants}</div>`;
            if (product.options && product.options.length > 0) {
                html += `<div class="detail-row"><span class="detail-label">Options:</span> ${product.options.map(o => escapeHtml(o)).join(' · ')}</div>`;
            }
            html += '</div></div>';

            if (product.description) {
                const cleanDesc = product.description.replace(/<[^>]*>/g, '');
                html += `<div class="detail-desc">${escapeHtml(cleanDesc)}</div>`;
            }

            if (product.url) {
                html += `<a href="${escapeHtml(product.url)}" target="_blank" rel="noopener" class="pdp-link">View on ${escapeHtml(currentDomain)}</a>`;
            }

            detail.innerHTML = html;
        } catch (e) {
            detail.innerHTML = `<div class="detail-loading">Failed to load details: ${escapeHtml(e.message)}</div>`;
        }
    }

    // Policies search
    async function searchPolicies() {
        const query = document.getElementById('policy-input').value.trim();
        if (!query) return;

        const results = document.getElementById('policy-results');
        results.innerHTML = '<span class="loading-dot">Looking up policy...</span>';

        try {
            const resp = await mcpCall('search_shop_policies_and_faqs', { query });
            const data = await resp.json();
            updateJsonPane(data);
            const qaPairs = extractPolicyQA(data);

            if (qaPairs.length > 0) {
                results.innerHTML = `<div class="policy-answer">${qaPairs.map(qa =>
                    `<div class="policy-qa"><div class="pq">${escapeHtml(qa.question)}</div><div class="pa">${escapeHtml(qa.answer)}</div></div>`
                ).join('')}</div>`;
            } else {
                const answer = extractPolicyAnswer(data);
                results.innerHTML = `<div class="policy-answer">${escapeHtml(answer)}</div>`;
            }
        } catch (e) {
            results.innerHTML = `<div class="step-detail">Policy lookup failed: ${escapeHtml(e.message)}</div>`;
        }
    }

    // Parsing helpers
    function analyzeRobotsTxt(text) {
        const lines = text.toLowerCase().split('\n');
        const blocked = [];

        for (const agent of AI_AGENTS) {
            const agentLower = agent.toLowerCase();
            let inAgentBlock = false;
            let isBlocked = false;

            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed.startsWith('user-agent:')) {
                    const ua = trimmed.replace('user-agent:', '').trim();
                    inAgentBlock = (ua === agentLower || ua === '*');
                } else if (inAgentBlock && trimmed.startsWith('disallow:')) {
                    const path = trimmed.replace('disallow:', '').trim();
                    if (path === '/' || path === '/*') {
                        isBlocked = true;
                    }
                } else if (trimmed.startsWith('user-agent:')) {
                    inAgentBlock = false;
                }
            }

            if (isBlocked) blocked.push(agent);
        }

        return {
            allowed: AI_AGENTS.length - blocked.length,
            blocked: blocked
        };
    }

    function extractCapabilities(ucpData) {
        const caps = [];
        if (ucpData.services) {
            for (const [key, val] of Object.entries(ucpData.services)) {
                if (val.capabilities) {
                    caps.push(...Object.keys(val.capabilities).map(c => `${key}.${c}`));
                } else {
                    caps.push(key);
                }
            }
        }
        if (ucpData.capabilities) {
            caps.push(...(Array.isArray(ucpData.capabilities) ? ucpData.capabilities : Object.keys(ucpData.capabilities)));
        }
        return caps;
    }

    function extractMcpEndpoint(ucpData, domain) {
        // Look for MCP transport in various possible structures
        if (ucpData.transport === 'mcp' && ucpData.endpoint) return ucpData.endpoint;
        if (ucpData.mcp && ucpData.mcp.endpoint) return ucpData.mcp.endpoint;
        if (ucpData.services) {
            for (const svc of Object.values(ucpData.services)) {
                if (svc.transport === 'mcp' && svc.endpoint) return svc.endpoint;
                if (svc.mcp && svc.mcp.endpoint) return svc.mcp.endpoint;
            }
        }
        // Default Shopify convention
        return `https://${domain}/api/ucp/mcp`;
    }

    function extractTools(data) {
        if (data.result && data.result.tools) return data.result.tools;
        if (data.tools) return data.tools;
        if (data.result && Array.isArray(data.result)) return data.result;
        return [];
    }

    function extractProducts(data) {
        const products = [];
        let source = null;

        if (data.result && data.result.structuredContent && data.result.structuredContent.products) {
            source = data.result.structuredContent.products;
        } else if (data.result && data.result.content) {
            for (const block of (Array.isArray(data.result.content) ? data.result.content : [])) {
                if (block.type === 'text') {
                    try {
                        const parsed = JSON.parse(block.text);
                        if (parsed.products) source = parsed.products;
                    } catch (e) {}
                }
            }
        }

        if (source && Array.isArray(source)) {
            for (const p of source.slice(0, 10)) {
                let img = p.image_url || p.imageUrl || p.image || p.featuredImage || (p.images && p.images[0]) || '';
                const imgUrl = typeof img === 'string' ? img : (img.url || img.src || '');

                let price = '';
                if (p.price_range) {
                    price = p.price_range.min !== undefined ? `$${p.price_range.min}` : '';
                    if (p.price_range.max && p.price_range.max !== p.price_range.min) price += ` – $${p.price_range.max}`;
                    if (p.price_range.currency) price += ` ${p.price_range.currency}`;
                } else if (p.price) {
                    price = typeof p.price === 'object' ? `${p.price.amount} ${p.price.currencyCode || ''}` : String(p.price);
                }

                products.push({
                    id: p.product_id || p.id || p.productId || '',
                    name: p.title || p.name || 'Unnamed product',
                    price: price,
                    image: imgUrl,
                    variantCount: p.total_variants || p.variantCount || (p.variants && p.variants.length) || 0,
                    url: p.url || ''
                });
            }
        }

        return products;
    }

    function extractProductDetail(data) {
        let p = null;
        if (data.result && data.result.structuredContent && data.result.structuredContent.product) {
            p = data.result.structuredContent.product;
        } else if (data.result && data.result.content) {
            for (const block of (Array.isArray(data.result.content) ? data.result.content : [])) {
                if (block.type === 'text') {
                    try {
                        const parsed = JSON.parse(block.text);
                        if (parsed.product) p = parsed.product;
                        else if (parsed.title || parsed.name) p = parsed;
                    } catch (e) {}
                }
            }
        }
        if (!p) p = {};

        // Extract image
        let image = p.image_url || p.imageUrl || '';
        if (!image && p.images && p.images.length > 0) {
            image = typeof p.images[0] === 'string' ? p.images[0] : (p.images[0].url || p.images[0].src || '');
        }
        if (!image && p.featuredImage) {
            image = typeof p.featuredImage === 'string' ? p.featuredImage : (p.featuredImage.url || '');
        }

        // Extract price
        let price = '';
        if (p.price_range) {
            price = p.price_range.min !== undefined ? `$${p.price_range.min}` : '';
            if (p.price_range.max && p.price_range.max !== p.price_range.min) {
                price += ` – $${p.price_range.max}`;
            }
            if (p.price_range.currency) price += ` ${p.price_range.currency}`;
        } else if (p.price) {
            price = typeof p.price === 'object' ? `${p.price.amount} ${p.price.currencyCode || ''}` : String(p.price);
        }

        return {
            name: p.title || p.name || 'Unknown product',
            description: p.description || p.descriptionHtml || '',
            price: price,
            url: p.url || '',
            image: image,
            totalVariants: p.total_variants || p.totalVariants || (p.variants && p.variants.length) || 0,
            options: p.options ? p.options.map(o => `${o.name}: ${(o.values || []).join(', ')}`) : [],
            variants: p.variants || []
        };
    }

    function extractPolicyQA(data) {
        // Try to parse Q&A pairs from content blocks
        if (data.result && data.result.content) {
            for (const block of (Array.isArray(data.result.content) ? data.result.content : [])) {
                if (block.type === 'text') {
                    try {
                        const parsed = JSON.parse(block.text);
                        if (Array.isArray(parsed) && parsed.length > 0 && parsed[0].question) {
                            return parsed;
                        }
                    } catch (e) {}
                }
            }
        }
        if (data.result && data.result.structuredContent && Array.isArray(data.result.structuredContent)) {
            if (data.result.structuredContent[0] && data.result.structuredContent[0].question) {
                return data.result.structuredContent;
            }
        }
        return [];
    }

    function extractPolicyAnswer(data) {
        if (data.result && data.result.content) {
            for (const block of (Array.isArray(data.result.content) ? data.result.content : [])) {
                if (block.type === 'text') return block.text;
            }
        }
        if (data.result && data.result.structuredContent && data.result.structuredContent.answer) {
            return data.result.structuredContent.answer;
        }
        if (data.result && typeof data.result === 'string') return data.result;
        return 'No answer returned.';
    }
